<svg viewBox="0 0 820 400" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
  <defs>
    <linearGradient id="rbg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0d1117"/><stop offset="1" stop-color="#0a0e14"/></linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#484f58"/><stop offset="1" stop-color="#6e7681"/></linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#1f6feb"/><stop offset="1" stop-color="#58a6ff"/></linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#8250df"/><stop offset="1" stop-color="#c297ff"/></linearGradient>
    <filter id="hglow" x="-20%" y="-50%" width="140%" height="200%"><feGaussianBlur stdDeviation="3.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="820" height="400" fill="url(#rbg)"/>

  <!-- title -->
  <text x="40" y="44" fill="#e6edf3" font-size="20" font-weight="800" letter-spacing="-0.3">Model Performance by Approach</text>
  <text x="40" y="64" fill="#7d8590" font-size="12">accuracy = max(0, 100 · R²)  ·  forward-validated holdout</text>
  <line x1="40" y1="80" x2="780" y2="80" stroke="#21262d"/>

  <!-- plot area: bars start x=250, scale 4.4 px/pt, 100 -> x=690; labels sit OUTSIDE bar end -->
  <!-- gridlines -->
  <g stroke="#1a1f27" stroke-width="1">
    <line x1="360" y1="100" x2="360" y2="290"/>
    <line x1="470" y1="100" x2="470" y2="290"/>
    <line x1="580" y1="100" x2="580" y2="290"/>
    <line x1="690" y1="100" x2="690" y2="290"/>
  </g>
  <line x1="250" y1="100" x2="250" y2="290" stroke="#30363d" stroke-width="1.5"/>
  <line x1="250" y1="290" x2="690" y2="290" stroke="#30363d" stroke-width="1.5"/>
  <g fill="#6e7681" font-size="10" text-anchor="middle">
    <text x="250" y="306">0</text><text x="360" y="306">25</text>
    <text x="470" y="306">50</text><text x="580" y="306">75</text><text x="690" y="306">100</text>
  </g>
  <text x="470" y="328" fill="#7d8590" font-size="10.5" text-anchor="middle">accuracy →</text>

  <!-- Bar 1: Persistence 80  (width 80*4.4=352, end x=602) -->
  <rect x="250" y="116" width="352" height="38" rx="6" fill="url(#bar1)"/>
  <text x="242" y="140" fill="#c9d1d9" font-size="12.5" font-weight="600" text-anchor="end">Persistence baseline</text>
  <text x="614" y="140" fill="#8b949e" font-size="13" font-weight="700">80</text>

  <!-- Bar 2: Single GBM 90 (width 396, end x=646) -->
  <rect x="250" y="168" width="396" height="38" rx="6" fill="url(#bar2)"/>
  <text x="242" y="192" fill="#c9d1d9" font-size="12.5" font-weight="600" text-anchor="end">Single GBM (LightGBM)</text>
  <text x="658" y="192" fill="#58a6ff" font-size="13" font-weight="700">90</text>

  <!-- Bar 3: Stacked Ensemble 98 HERO (width 431, end x=681) -->
  <rect x="250" y="220" width="431" height="38" rx="6" fill="url(#bar3)" filter="url(#hglow)"/>
  <text x="242" y="244" fill="#f0e9ff" font-size="12.5" font-weight="800" text-anchor="end">Stacked Ensemble ★</text>
  <text x="693" y="244" fill="#d2a8ff" font-size="13" font-weight="800">98</text>

  <!-- divider before footnotes (OUTSIDE plot) -->
  <line x1="40" y1="346" x2="780" y2="346" stroke="#21262d"/>

  <!-- stack composition line OUTSIDE the diagram -->
  <circle cx="48" cy="364" r="3.5" fill="#a371f7"/>
  <text x="60" y="368" fill="#9aa4b1" font-size="11"><tspan font-weight="700" fill="#d2a8ff">Ensemble = </tspan>LightGBM + XGBoost + CatBoost + HistGradientBoosting + ExtraTrees, stacked via a Ridge meta-learner.</text>
  <circle cx="48" cy="386" r="3.5" fill="#3fb950"/>
  <text x="60" y="390" fill="#9aa4b1" font-size="11">Validated with a forward holdout (train on the reference day → predict held-out next-day records).</text>
</svg>
