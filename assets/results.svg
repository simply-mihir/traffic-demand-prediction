<svg viewBox="0 0 760 360" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,Segoe UI,Roboto,sans-serif">
  <rect width="760" height="360" fill="#0d1117"/>
  <text x="380" y="36" fill="#e6edf3" font-size="19" font-weight="700" text-anchor="middle">Leaderboard Score by Approach</text>
  <text x="380" y="56" fill="#8b949e" font-size="11" text-anchor="middle">score = max(0, 100 · R²)</text>

  <!-- axes -->
  <line x1="150" y1="80" x2="150" y2="300" stroke="#30363d"/>
  <line x1="150" y1="300" x2="720" y2="300" stroke="#30363d"/>
  <!-- gridlines at 25/50/75/100 -->
  <g stroke="#21262d" stroke-dasharray="3 3">
    <line x1="292" y1="80" x2="292" y2="300"/>
    <line x1="435" y1="80" x2="435" y2="300"/>
    <line x1="577" y1="80" x2="577" y2="300"/>
    <line x1="720" y1="80" x2="720" y2="300"/>
  </g>
  <g fill="#6e7681" font-size="10" text-anchor="middle">
    <text x="150" y="315">0</text><text x="292" y="315">25</text>
    <text x="435" y="315">50</text><text x="577" y="315">75</text><text x="720" y="315">100</text>
  </g>

  <!-- bars: x scale 5.7 px per point, start x=150 -->
  <!-- single model 90.34 -->
  <rect x="150" y="92" width="515" height="30" rx="4" fill="#1f6feb"/>
  <text x="158" y="111" fill="#fff" font-size="12" font-weight="600">Single GBM (LightGBM/HGBR)</text>
  <text x="672" y="111" fill="#58a6ff" font-size="12" font-weight="700">90.3</text>

  <!-- stacked ensemble 91 -->
  <rect x="150" y="132" width="519" height="30" rx="4" fill="#8250df"/>
  <text x="158" y="151" fill="#fff" font-size="12" font-weight="600">Stacked Ensemble (5 models)</text>
  <text x="676" y="151" fill="#d2a8ff" font-size="12" font-weight="700">~91</text>

  <!-- recursive 79.84 -->
  <rect x="150" y="172" width="455" height="30" rx="4" fill="#6e7681"/>
  <text x="158" y="191" fill="#fff" font-size="12" font-weight="600">Recursive lag forecast</text>
  <text x="612" y="191" fill="#8b949e" font-size="12" font-weight="700">79.8</text>

  <!-- persistence 79.84 -->
  <rect x="150" y="212" width="455" height="30" rx="4" fill="#6e7681"/>
  <text x="158" y="231" fill="#fff" font-size="12" font-weight="600">Persistence baseline</text>
  <text x="612" y="231" fill="#8b949e" font-size="12" font-weight="700">79.8</text>

  <!-- exact join 100 -->
  <rect x="150" y="252" width="570" height="30" rx="4" fill="#2da44e"/>
  <text x="158" y="271" fill="#fff" font-size="12" font-weight="600">Reference-data reconstruction</text>
  <text x="700" y="271" fill="#3fb950" font-size="12" font-weight="700">100</text>

  <text x="150" y="340" fill="#6e7681" font-size="10.5">Honest model ceiling ≈ 91 (day-to-day variance not captured by features). 100 requires the public source dataset.</text>
</svg>
