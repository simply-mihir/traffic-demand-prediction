<svg viewBox="0 0 920 360" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,Segoe UI,Roboto,sans-serif">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f6feb"/><stop offset="1" stop-color="#1158c7"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2da44e"/><stop offset="1" stop-color="#1a7f37"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8250df"/><stop offset="1" stop-color="#6639ba"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#8b949e"/>
    </marker>
  </defs>
  <rect width="920" height="360" fill="#0d1117"/>
  <text x="460" y="36" fill="#e6edf3" font-size="20" font-weight="700" text-anchor="middle">Traffic Demand Prediction — Pipeline</text>

  <!-- Stage 1: Data -->
  <rect x="30" y="70" width="170" height="210" rx="12" fill="#161b22" stroke="#30363d"/>
  <text x="115" y="96" fill="#58a6ff" font-size="14" font-weight="700" text-anchor="middle">1 · Raw Data</text>
  <text x="115" y="124" fill="#c9d1d9" font-size="11" text-anchor="middle">train.csv (77,299)</text>
  <text x="115" y="144" fill="#c9d1d9" font-size="11" text-anchor="middle">test.csv (41,778)</text>
  <line x1="48" y1="158" x2="182" y2="158" stroke="#30363d"/>
  <text x="115" y="180" fill="#8b949e" font-size="10.5" text-anchor="middle">geohash · day</text>
  <text x="115" y="197" fill="#8b949e" font-size="10.5" text-anchor="middle">timestamp · demand</text>
  <text x="115" y="214" fill="#8b949e" font-size="10.5" text-anchor="middle">RoadType · Weather</text>
  <text x="115" y="231" fill="#8b949e" font-size="10.5" text-anchor="middle">Temperature · Lanes</text>
  <text x="115" y="258" fill="#6e7681" font-size="10" text-anchor="middle" font-style="italic">spatio-temporal</text>
  <text x="115" y="272" fill="#6e7681" font-size="10" text-anchor="middle" font-style="italic">15-min series</text>

  <!-- Stage 2: Features -->
  <rect x="245" y="70" width="200" height="210" rx="12" fill="#161b22" stroke="#30363d"/>
  <rect x="245" y="70" width="200" height="30" rx="12" fill="url(#g1)"/>
  <text x="345" y="90" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">2 · Feature Engineering</text>
  <text x="262" y="122" fill="#c9d1d9" font-size="11">◆ geohash → lat/lon</text>
  <text x="262" y="142" fill="#c9d1d9" font-size="11">◆ cyclical time (sin/cos)</text>
  <text x="262" y="162" fill="#c9d1d9" font-size="11">◆ K-fold target encoding</text>
  <text x="278" y="179" fill="#8b949e" font-size="10">geohash × time profiles</text>
  <text x="262" y="199" fill="#c9d1d9" font-size="11">◆ day-48 demand profile</text>
  <text x="262" y="219" fill="#c9d1d9" font-size="11">◆ K-means geo-clusters</text>
  <text x="262" y="239" fill="#c9d1d9" font-size="11">◆ context attributes</text>
  <text x="262" y="263" fill="#6e7681" font-size="10" font-style="italic">leak-free · train+test joint</text>

  <!-- Stage 3: Models -->
  <rect x="490" y="70" width="200" height="210" rx="12" fill="#161b22" stroke="#30363d"/>
  <rect x="490" y="70" width="200" height="30" rx="12" fill="url(#g3)"/>
  <text x="590" y="90" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">3 · Stacked Ensemble</text>
  <rect x="506" y="112" width="168" height="22" rx="6" fill="#21262d" stroke="#30363d"/>
  <text x="590" y="127" fill="#c9d1d9" font-size="11" text-anchor="middle">LightGBM</text>
  <rect x="506" y="138" width="168" height="22" rx="6" fill="#21262d" stroke="#30363d"/>
  <text x="590" y="153" fill="#c9d1d9" font-size="11" text-anchor="middle">XGBoost</text>
  <rect x="506" y="164" width="168" height="22" rx="6" fill="#21262d" stroke="#30363d"/>
  <text x="590" y="179" fill="#c9d1d9" font-size="11" text-anchor="middle">CatBoost</text>
  <rect x="506" y="190" width="80" height="22" rx="6" fill="#21262d" stroke="#30363d"/>
  <text x="546" y="205" fill="#c9d1d9" font-size="11" text-anchor="middle">HGBR</text>
  <rect x="594" y="190" width="80" height="22" rx="6" fill="#21262d" stroke="#30363d"/>
  <text x="634" y="205" fill="#c9d1d9" font-size="11" text-anchor="middle">ExtraTrees</text>
  <rect x="506" y="224" width="168" height="40" rx="6" fill="url(#g3)" opacity="0.25" stroke="#8250df"/>
  <text x="590" y="240" fill="#d2a8ff" font-size="11" font-weight="700" text-anchor="middle">Ridge meta-learner</text>
  <text x="590" y="256" fill="#8b949e" font-size="10" text-anchor="middle">out-of-fold stacking</text>

  <!-- Stage 4: Output -->
  <rect x="735" y="70" width="155" height="210" rx="12" fill="#161b22" stroke="#30363d"/>
  <rect x="735" y="70" width="155" height="30" rx="12" fill="url(#g2)"/>
  <text x="812" y="90" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">4 · Output</text>
  <text x="812" y="126" fill="#c9d1d9" font-size="11" text-anchor="middle">log-space training</text>
  <text x="812" y="148" fill="#c9d1d9" font-size="11" text-anchor="middle">clip to [0, 1]</text>
  <text x="812" y="170" fill="#c9d1d9" font-size="11" text-anchor="middle">3 seeds × 5 folds</text>
  <line x1="752" y1="184" x2="872" y2="184" stroke="#30363d"/>
  <text x="812" y="208" fill="#3fb950" font-size="12" font-weight="700" text-anchor="middle">submission.csv</text>
  <text x="812" y="226" fill="#8b949e" font-size="10.5" text-anchor="middle">41,778 × 2</text>
  <text x="812" y="252" fill="#8b949e" font-size="10.5" text-anchor="middle">Index, demand</text>

  <!-- arrows -->
  <line x1="200" y1="175" x2="243" y2="175" stroke="#8b949e" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="445" y1="175" x2="488" y2="175" stroke="#8b949e" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="690" y1="175" x2="733" y2="175" stroke="#8b949e" stroke-width="2" marker-end="url(#arr)"/>
</svg>
